function dk(dateStr) { return dateStr; }

let logDiv = document.getElementById('log');

days.forEach((day, i) => {
  setTimeout(() => {
    const key = 'rbj_' + day.date;
    const meals = day.meals.map((m, j) => ({ ...m, id: Date.now() + i * 100 + j }));
    const data = { meals };
    if (day.weight) data.weight = day.weight;
    if (day.activity) data.activity = day.activity;
    localStorage.setItem(key, JSON.stringify(data));

    const el = document.createElement('div');
    el.className = 'item ok';
    el.textContent = '✓ ' + day.date + ' — ' + meals.length + ' meals logged';
    logDiv.appendChild(el);

    if (i === days.length - 1) {
      setTimeout(() => {
        document.getElementById('msg').style.display = 'none';
        document.getElementById('done').style.display = 'block';
        document.getElementById('go').style.display = 'inline-block';
      }, 400);
    }
  }, i * 120);
});
